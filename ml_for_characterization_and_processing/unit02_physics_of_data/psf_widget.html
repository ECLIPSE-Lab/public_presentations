<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: transparent;
        }
        .controls { 
            display: flex; 
            flex-direction: row;
            gap: 40px; 
            margin-top: 10px; 
            background: #f8f9fa; 
            padding: 20px 40px; 
            border-radius: 12px; 
            border: 1px solid #e9ecef;
            width: 95%; 
            box-sizing: border-box; 
            align-items: center;
        }
        .control-group { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
        }
        label { 
            font-weight: 600; 
            font-size: 16px; 
            margin-bottom: 5px; 
            color: #333; 
        }
        input[type=range] { 
            width: 100%; 
            margin-top: 5px;
        }
        .container { 
            display: flex; 
            flex-direction: row; 
            gap: 20px; 
            width: 95%; 
            justify-content: space-around; 
            margin-top: 25px; 
        }
        .box { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .box-title { 
            font-weight: 700; 
            margin-bottom: 12px; 
            font-size: 18px; 
            color: #212529;
            text-align: center;
        }
        canvas { 
            background: black;
            border: 1px solid #adb5bd; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
            border-radius: 4px; 
            width: 280px;
            height: 280px;
        }
        .math-symbol {
            font-style: italic;
            font-family: "Times New Roman", Times, serif;
        }
        .equation {
            font-size: 22px;
            font-weight: bold;
            margin-top: 25px;
            color: #495057;
            background: #e9ecef;
            padding: 10px 20px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <div class="control-group">
            <label>PSF Width (Blur <span class="math-symbol">&sigma;</span>): <span id="blurVal">5.0</span> px</label>
            <input type="range" id="blurSlider" min="0.1" max="25" step="0.5" value="6.0">
        </div>
        <div class="control-group">
            <label>Detector Noise (<span class="math-symbol">&sigma;_n</span>): <span id="noiseVal">30</span></label>
            <input type="range" id="noiseSlider" min="0" max="150" step="2" value="30">
        </div>
    </div>
    
    <div class="container">
        <div class="box">
            <div class="box-title">True Object</div>
            <canvas id="canvasTrue" width="280" height="280"></canvas>
        </div>
        <div class="box">
            <div class="box-title">Point Spread Function</div>
            <canvas id="canvasPSF" width="280" height="280"></canvas>
        </div>
        <div class="box">
            <div class="box-title">Measured Image</div>
            <canvas id="canvasMeas" width="280" height="280"></canvas>
        </div>
    </div>
    <div class="equation">
        Measured Image = True Object &lowast; PSF + Noise
    </div>

    <script>
        const blurSlider = document.getElementById('blurSlider');
        const noiseSlider = document.getElementById('noiseSlider');
        
        const cTrue = document.getElementById('canvasTrue');
        const ctxTrue = cTrue.getContext('2d');
        
        const cPSF = document.getElementById('canvasPSF');
        const ctxPSF = cPSF.getContext('2d');
        
        const cMeas = document.getElementById('canvasMeas');
        const ctxMeas = cMeas.getContext('2d', { willReadFrequently: true });

        // Generate True Object with different scientific/microscopy like features
        function drawTrueObject() {
            ctxTrue.fillStyle = 'black';
            ctxTrue.fillRect(0, 0, 280, 280);
            
            ctxTrue.fillStyle = '#ffffff'; // White signals

            // Feature 1: Two close points (to demonstrate Abbe limit when they merge)
            ctxTrue.beginPath(); ctxTrue.arc(125, 70, 3, 0, Math.PI*2); ctxTrue.fill();
            ctxTrue.beginPath(); ctxTrue.arc(155, 70, 3, 0, Math.PI*2); ctxTrue.fill();
            
            // Feature 2: High spatial frequency grating
            for(let i=0; i<8; i++) {
                ctxTrue.fillRect(40 + i*11, 140, 4, 80);
            }
            
            // Feature 3: Low spatial frequency grating
            for(let i=0; i<4; i++) {
                ctxTrue.fillRect(160 + i*25, 140, 10, 80);
            }
            
            // A sharp larger structure (edge response)
            ctxTrue.beginPath(); 
            ctxTrue.arc(140, 250, 15, 0, Math.PI); 
            ctxTrue.fill();
        }

        function update() {
            const blur = parseFloat(blurSlider.value);
            const noise = parseFloat(noiseSlider.value);
            document.getElementById('blurVal').textContent = blur.toFixed(1);
            document.getElementById('noiseVal').textContent = noise;
            
            // Draw PSF (single point at center blurred)
            ctxPSF.fillStyle = 'black';
            ctxPSF.fillRect(0, 0, 280, 280);
            ctxPSF.filter = `blur(${blur}px)`;
            ctxPSF.fillStyle = '#ffffff';
            ctxPSF.beginPath(); ctxPSF.arc(140, 140, 1.5, 0, Math.PI*2); ctxPSF.fill();
            ctxPSF.filter = 'none';

            // Draw Measured Image = True * PSF
            ctxMeas.fillStyle = 'black';
            ctxMeas.fillRect(0, 0, 280, 280);
            ctxMeas.filter = `blur(${blur}px)`;
            ctxMeas.drawImage(cTrue, 0, 0);
            ctxMeas.filter = 'none';

            // Add Noise to Meas
            if (noise > 0) {
                const imgData = ctxMeas.getImageData(0, 0, 280, 280);
                const data = imgData.data;
                for(let i = 0; i < data.length; i += 4) {
                    // Fast approximation of Gaussian noise: sum of uniform variables
                    let n = ((Math.random() + Math.random() + Math.random() - 1.5) / 1.5) * noise * 2.0;
                    data[i] = Math.min(255, Math.max(0, data[i] + n));
                    data[i+1] = Math.min(255, Math.max(0, data[i+1] + n));
                    data[i+2] = Math.min(255, Math.max(0, data[i+2] + n));
                }
                ctxMeas.putImageData(imgData, 0, 0);
            }
        }

        drawTrueObject();
        blurSlider.addEventListener('input', update);
        noiseSlider.addEventListener('input', update);
        update();
    </script>
</body>
</html>
