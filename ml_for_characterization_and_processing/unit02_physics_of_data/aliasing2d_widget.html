<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background: transparent;
        }
        .controls { 
            display: flex; 
            flex-direction: column;
            gap: 15px; 
            margin-top: 10px; 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #e9ecef;
            width: 90%; 
            box-sizing: border-box; 
        }
        .control-group { 
            display: flex; 
            flex-direction: row; 
            align-items: center;
            justify-content: space-between;
        }
        label { 
            font-weight: 600; 
            font-size: 16px; 
            color: #333;
            width: 350px;
        }
        input[type=range] { 
            flex: 1; 
            margin-left: 20px;
        }
        .canvas-container {
            margin-top: 25px;
            display: flex;
            gap: 30px;
            justify-content: center;
            width: 90%;
        }
        .canvas-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            width: 380px;
            height: 380px;
            border: 1px solid #adb5bd;
            border-radius: 4px;
            /* Nearest neighbor interpolation so we clearly see the large pixels */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .canvas-title {
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 12px;
            color: #212529;
        }
    </style>
</head>
<body>
    <div class="controls">
        <div class="control-group">
            <label for="patternFreq">Spatial Frequency (Pattern Density): <span id="freqVal">150</span></label>
            <input type="range" id="patternFreq" min="20" max="400" step="5" value="150">
        </div>
        <div class="control-group">
            <label for="sampleRes">Sensor Sampling Resolution: <span id="resVal">50</span> x <span id="resVal2">50</span> px</label>
            <input type="range" id="sampleRes" min="10" max="380" step="2" value="46">
        </div>
    </div>
    
    <div class="canvas-container">
        <div class="canvas-box">
            <div class="canvas-title">"True" Physical Signal</div>
            <canvas id="canvasTrue" width="380" height="380"></canvas>
        </div>
        <div class="canvas-box">
            <div class="canvas-title">Sampled Digital Signal (Aliased)</div>
            <canvas id="canvasSampled"></canvas>
        </div>
    </div>

    <script>
        const patternFreq = document.getElementById('patternFreq');
        const sampleRes = document.getElementById('sampleRes');
        const freqVal = document.getElementById('freqVal');
        const resVal = document.getElementById('resVal');
        const resVal2 = document.getElementById('resVal2');
        
        const canvasTrue = document.getElementById('canvasTrue');
        const ctxTrue = canvasTrue.getContext('2d');
        
        const canvasSampled = document.getElementById('canvasSampled');
        const ctxSampled = canvasSampled.getContext('2d');

        function drawSignals() {
            const freq = parseFloat(patternFreq.value);
            const res = parseInt(sampleRes.value);
            
            freqVal.textContent = freq;
            resVal.textContent = res;
            resVal2.textContent = res;
            
            canvasSampled.width = res;
            canvasSampled.height = res;

            // Draw "True" Signal (High resolution 380x380)
            drawSinePattern(ctxTrue, 380, 380, freq);
            
            // Draw Sampled Signal (Low/Variable resolution)
            drawSinePattern(ctxSampled, res, res, freq);
        }

        function drawSinePattern(ctx, w, h, freq) {
            const imageData = ctx.createImageData(w, h);
            const data = imageData.data;
            
            for (let py = 0; py < h; py++) {
                for (let px = 0; px < w; px++) {
                    const x = (px / (w - 1)) * 2 - 1;
                    const y = (py / (h - 1)) * 2 - 1;
                    
                    // Zone plate formula: sin(freq * (x^2 + y^2))
                    const val = Math.sin(freq * (x * x + y * y));
                    
                    // Map from [-1, 1] to [0, 255]
                    const color = Math.floor((val + 1) * 127.5);
                    
                    const idx = (py * w + px) * 4;
                    data[idx] = color;     // R
                    data[idx+1] = color;   // G
                    data[idx+2] = color;   // B
                    data[idx+3] = 255;     // Alpha
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        patternFreq.addEventListener('input', drawSignals);
        sampleRes.addEventListener('input', drawSignals);
        
        drawSignals();
    </script>
</body>
</html>
