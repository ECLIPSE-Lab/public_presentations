name: Build and Deploy Quarto Presentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: release
          tinytex: false

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          
      - name: Build Presentations
        run: |
          quarto render data_science_for_em/02_regression/template.qmd --to revealjs
          quarto render data_science_for_em/01_intro/template.qmd --to revealjs
          quarto render mathematical_foundations_of_ai_and_ml/01_learning_vs_data_analysis/01_intro.qmd --to revealjs

      - name: Stage published files
        run: |
          mkdir -p _publish/data_science_for_em/02_regression
          mkdir -p _publish/data_science_for_em/01_intro
          mkdir -p _publish/mathematical_foundations_of_ai_and_ml/01_learning_vs_data_analysis
          cp -r data_science_for_em/02_regression/docs/* _publish/data_science_for_em/02_regression/ 2>/dev/null || cp -r data_science_for_em/02_regression/* _publish/data_science_for_em/02_regression/
          cp -r data_science_for_em/01_intro/docs/* _publish/data_science_for_em/01_intro/ 2>/dev/null || cp -r data_science_for_em/01_intro/* _publish/data_science_for_em/01_intro/
          cp -r mathematical_foundations_of_ai_and_ml/01_learning_vs_data_analysis/01_intro/* _publish/mathematical_foundations_of_ai_and_ml/01_learning_vs_data_analysis/ 2>/dev/null || true
          cp -r _site/mathematical_foundations_of_ai_and_ml/01_learning_vs_data_analysis/01_intro/* _publish/mathematical_foundations_of_ai_and_ml/01_learning_vs_data_analysis/ 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: _publish

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4 
