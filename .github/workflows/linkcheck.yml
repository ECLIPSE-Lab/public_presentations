name: Link check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # weekly: catch link rot

permissions:
  contents: read
  issues: write

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          # Check the curriculum index pages and README; lychee follows internal HTML links automatically.
          # `--no-progress` keeps logs short. `--accept` covers GitHub's rate-limit + redirect codes.
          args: >-
            --no-progress
            --max-concurrency 8
            --timeout 20
            --retry-wait-time 5
            --max-retries 2
            --accept 200,206,301,302,308,403,429
            --exclude-path _site
            --exclude-path .quarto
            --exclude-path _freeze
            --exclude-path .venv
            --exclude-path .worktrees
            'README.md'
            'index.qmd'
            'mathematical_foundations_of_ai_and_ml/**/*.qmd'
            'ml_for_characterization_and_processing/**/*.qmd'
            'materials_genomics/**/*.qmd'
            'data_science_for_em/**/*.qmd'
            'conference_talks/**/*.qmd'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
