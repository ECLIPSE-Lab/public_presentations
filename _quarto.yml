project:
  type: website
  render:
    - "*.qmd"
    - "*.ipynb"
    - "!*.md"
    # Root scratch files for local Python/knitr checks; publishing renames from root
    # to _site and fails on some Windows/OneDrive setups (ENOENT on rename).
    - "!test_python.qmd"
    - "!test_d2l.qmd"

website:
  title: "ECLIPSE Presentations"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: cheat_sheet.html
        text: Cheat Sheet
       
execute:
  echo: true
  eval: true
  python: true
  python-version: "3"
  python-venv: ".venv"
  python-path: ".venv/Scripts/python.exe" 
  enabled: false
  
format:
  html:
    theme:
      - darkly
      - custom.scss
    css: styles.css
    toc: true
  revealjs:
    include-in-header:
      - assets/includes/reveal-hover-examples.html
 
 