project:
  type: website
  render:
    - "*.qmd"
    - "*.ipynb"
    - "!*.md"
    # Root scratch files for local Python/knitr checks; publishing renames from root
    # to _site and fails on some Windows/OneDrive setups (ENOENT on rename).
    - "!test_python.qmd"
    - "!test_d2l.qmd"

website:
  title: "ECLIPSE Presentations"  
  favicon: favicon-32x32.png
  open-graph: true
  image: https://pelzlab.science/img/eclipse_header.png
  twitter-card: 
    creator: "@PhilippPelz"
    image: https://pelzlab.science/img/eclipse_header.png
  site-url: https://pelzlab.science
  navbar:
    logo: https://pelzlab.science/img/FAU.png
    logo-href: https://pelzlab.science
    search: true
    tools:
      - icon: stars
        href: https://pelzlab.science/hyperscale.html
      - icon: twitter
        href: https://twitter.com/PhilippPelz
      - icon: github
        menu:
          - text: Source Code
            url:  https://github.com/ECLIPSE-Lab
    left:
      - href: index.qmd
        text: Home
      - href: cheat_sheet.html
        text: Cheat Sheet
    right:
      - href: https://pelzlab.science/hyperscale.html
        text: "<img src='https://pelzlab.science/img/ERC-LOGO-01.svg' height='30' style='vertical-align: middle; margin-right: 5px;' alt='ERC Logo'/> HyperScaleEM"
      - href: https://pelzlab.science/news.html
        text: News
      - href: https://pelzlab.science/teaching.html
        text: Teaching
      - href: https://pelzlab.science/people.html
        text: People
      - href: https://pelzlab.science/research.html
        text: Research
      - href: https://pelzlab.science/publications.html
        text: Publications 
      - href: https://pelzlab.science/resources.html
        text: Resources
      - href: https://pelzlab.science/opportunities.html
        text: Opportunities
      - href: https://pelzlab.science/values.html
        text: Values
      - href: https://pelzlab.science/contact.html
        text: Contact

  page-footer:    
    center: 
      - text: "Imprint"
        href: https://pelzlab.science/about.html
      - text: "Privacy Notice"
        href: https://pelzlab.science/license.html
      - text: "Accessibility Statement"
        href: https://pelzlab.science/trademark.html
  google-analytics:
    tracking-id: "G-TVZKKP7YNR"  
    anonymize-ip: true  
  repo-url: https://github.com/ECLIPSE-Lab/public_presentations
  repo-actions: [source, issue]

execute:
  echo: true
  eval: true
  python: true
  python-version: "3"
  python-venv: ".venv"
  python-path: ".venv/Scripts/python.exe" 
  enabled: false
  
format:
  html:
    theme:
      - darkly
      - custom.scss
    css: styles.css
    toc: true
    header-includes:
      - <link rel="canonical" href="https://pelzlab.science{{ page_url }}">
      - <meta property="og:site_name" content="ECLIPSE Lab">
