<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">U-Net encoder-decoder schema</title>
  <desc id="desc">A U-shaped encoder-decoder convolutional network with skip connections from encoder stages to decoder stages.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="white"/>
    </marker>
    <style>
      .label { fill: white; font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: 700; }
      .small { fill: white; font-family: Arial, Helvetica, sans-serif; font-size: 18px; }
      .boxText { fill: white; font-family: Arial, Helvetica, sans-serif; font-size: 20px; font-weight: 700; text-anchor: middle; dominant-baseline: middle; }
      .encoder { fill: #1f77b4; stroke: white; stroke-width: 3; }
      .decoder { fill: #ff7f0e; stroke: white; stroke-width: 3; }
      .bottleneck { fill: #6a3d9a; stroke: white; stroke-width: 3; }
      .head { fill: #2ca02c; stroke: white; stroke-width: 3; }
      .arrow { fill: none; stroke: white; stroke-width: 4; marker-end: url(#arrow); }
      .skip { fill: none; stroke: white; stroke-width: 4; stroke-dasharray: 12 10; marker-end: url(#arrow); }
    </style>
  </defs>

  <text x="80" y="45" class="label">Encoder path</text>
  <text x="520" y="45" class="label">Bottleneck</text>
  <text x="850" y="45" class="label">Decoder path</text>

  <rect x="60" y="100" width="120" height="70" rx="10" class="encoder"/>
  <text x="120" y="135" class="boxText">64</text>
  <text x="120" y="192" class="small" text-anchor="middle">H x W</text>

  <rect x="240" y="170" width="120" height="70" rx="10" class="encoder"/>
  <text x="300" y="205" class="boxText">128</text>
  <text x="300" y="262" class="small" text-anchor="middle">H/2 x W/2</text>

  <rect x="420" y="240" width="120" height="70" rx="10" class="encoder"/>
  <text x="480" y="275" class="boxText">256</text>
  <text x="480" y="332" class="small" text-anchor="middle">H/4 x W/4</text>

  <rect x="600" y="310" width="120" height="70" rx="10" class="bottleneck"/>
  <text x="660" y="345" class="boxText">512</text>
  <text x="660" y="402" class="small" text-anchor="middle">H/8 x W/8</text>

  <rect x="780" y="240" width="120" height="70" rx="10" class="decoder"/>
  <text x="840" y="275" class="boxText">256</text>
  <text x="840" y="332" class="small" text-anchor="middle">H/4 x W/4</text>

  <rect x="930" y="170" width="120" height="70" rx="10" class="decoder"/>
  <text x="990" y="205" class="boxText">128</text>
  <text x="990" y="262" class="small" text-anchor="middle">H/2 x W/2</text>

  <rect x="1080" y="100" width="90" height="70" rx="10" class="decoder"/>
  <text x="1125" y="135" class="boxText">64</text>
  <text x="1125" y="192" class="small" text-anchor="middle">H x W</text>

  <rect x="1080" y="20" width="90" height="50" rx="10" class="head"/>
  <text x="1125" y="45" class="boxText">K</text>
  <text x="1125" y="88" class="small" text-anchor="middle">mask logits</text>

  <path d="M180 135 C210 135 220 180 240 205" class="arrow"/>
  <path d="M360 205 C390 205 400 250 420 275" class="arrow"/>
  <path d="M540 275 C570 275 580 320 600 345" class="arrow"/>
  <path d="M720 345 C750 345 760 290 780 275" class="arrow"/>
  <path d="M900 275 C915 275 915 220 930 205" class="arrow"/>
  <path d="M1050 205 C1065 205 1065 150 1080 135" class="arrow"/>
  <path d="M1125 100 L1125 70" class="arrow"/>

  <path d="M540 255 C620 205 700 205 780 255" class="skip"/>
  <path d="M360 190 C520 100 770 100 930 190" class="skip"/>
  <path d="M180 120 C440 0 820 0 1080 120" class="skip"/>

  <text x="165" y="92" class="small">same-shape skip connections</text>
  <text x="520" y="92" class="small">concatenate matching-resolution encoder features</text>
  <text x="75" y="480" class="small">Downsample: more channels, less spatial resolution</text>
  <text x="760" y="480" class="small">Upsample: recover resolution, use skips for localization</text>
</svg>
