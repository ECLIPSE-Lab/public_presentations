<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0b1320"/>
  <text x="24" y="42" fill="#d8e6ff" font-size="28" font-family="Arial, sans-serif">Nominal Data Example</text>
  <rect x="24" y="70" width="592" height="290" rx="10" fill="#111d30" stroke="#3a5a8a"/>

  <!-- Material Icons Backgrounds -->
  <g fill="#1d2f4a" stroke="#3a5a8a" stroke-width="2">
    <rect x="60" y="110" width="140" height="120" rx="8" />
    <rect x="250" y="110" width="140" height="120" rx="8" />
    <rect x="440" y="110" width="140" height="120" rx="8" />
  </g>

  <!-- Shapes inside icons to show different unique properties -->
  <circle cx="130" cy="170" r="32" fill="#5da0d6" />
  <rect x="288" y="138" width="64" height="64" rx="8" fill="#f8d36f" />
  <path d="M475 195 L510 135 L545 195 Z" fill="#8de2a9" />

  <g font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#d8e6ff">
    <text x="130" y="264">Steel</text>
    <text x="320" y="264">Titanium</text>
    <text x="510" y="264">Aluminum</text>
  </g>

  <g font-size="15" font-family="Courier New, monospace" text-anchor="middle" fill="#8ca9d3">
    <text x="130" y="290">ID: 0</text>
    <text x="320" y="290">ID: 1</text>
    <text x="510" y="290">ID: 2</text>
  </g>

  <text x="320" y="335" font-size="16" font-family="Arial, sans-serif" fill="#9dc3ff" text-anchor="middle">
    Arbitrary mapping (0 &lt; 1 &lt; 2 has no physical meaning)
  </text>
</svg>
