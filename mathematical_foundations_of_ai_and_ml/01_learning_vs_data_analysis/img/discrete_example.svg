<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <rect width="300" height="200" fill="#ffffff" rx="12" />
  
  <!-- Grid lines -->
  <path d="M 30 160 L 270 160 M 30 120 L 270 120 M 30 80 L 270 80 M 30 40 L 270 40" stroke="#f1f5f9" stroke-width="1.5" />
  <path d="M 30 160 L 30 40 M 90 160 L 90 40 M 150 160 L 150 40 M 210 160 L 210 40 M 270 160 L 270 40" stroke="#f1f5f9" stroke-width="1.5" />
  
  <!-- Y axis ticks -->
  <text x="22" y="163" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="end">0</text>
  <text x="22" y="123" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="end">1</text>
  <text x="22" y="83" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="end">2</text>
  <text x="22" y="43" font-family="sans-serif" font-size="10" fill="#64748b" text-anchor="end">3</text>

  <!-- Axes -->
  <polyline points="30,40 30,160 270,160" fill="none" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Discrete Points (Stem Plot) -->
  <g stroke="#0ea5e9" stroke-width="2" stroke-linecap="round">
    <line x1="50" y1="160" x2="50" y2="120"/>
    <circle cx="50" cy="120" r="4" fill="#0284c7" stroke="#fff" stroke-width="1.5"/>
    
    <line x1="90" y1="160" x2="90" y2="80"/>
    <circle cx="90" cy="80" r="4" fill="#0284c7" stroke="#fff" stroke-width="1.5"/>
    
    <line x1="130" y1="160" x2="130" y2="120"/>
    <circle cx="130" cy="120" r="4" fill="#0284c7" stroke="#fff" stroke-width="1.5"/>
    
    <line x1="170" y1="160" x2="170" y2="40"/>
    <circle cx="170" cy="40" r="4" fill="#0284c7" stroke="#fff" stroke-width="1.5"/>
    
    <line x1="210" y1="160" x2="210" y2="80"/>
    <circle cx="210" cy="80" r="4" fill="#0284c7" stroke="#fff" stroke-width="1.5"/>
    
    <line x1="250" y1="160" x2="250" y2="120"/>
    <circle cx="250" cy="120" r="4" fill="#0284c7" stroke="#fff" stroke-width="1.5"/>
  </g>
  
  <!-- Boxes to emphasize exact integer values -->
  <rect x="75" y="65" width="30" height="14" fill="#f8fafc" rx="2" stroke="#cbd5e1" stroke-width="1"/>
  <text x="90" y="75" font-family="sans-serif" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">y=2</text>
  
  <rect x="155" y="25" width="30" height="14" fill="#f8fafc" rx="2" stroke="#cbd5e1" stroke-width="1"/>
  <text x="170" y="35" font-family="sans-serif" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">y=3</text>

</svg>
