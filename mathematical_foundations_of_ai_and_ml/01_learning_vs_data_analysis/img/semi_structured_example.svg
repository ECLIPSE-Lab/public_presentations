    <text x="58" y="246" fill="#9fd2ff">}</text>
  </g>
  <text x="58" y="302" fill="#c5d4f7" font-size="16" font-family="Arial, sans-serif">JSON/email-like records: partial structure + flexible fields.</text>
</svg>
