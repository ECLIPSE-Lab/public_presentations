<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#10131e"/>
  <text x="24" y="42" fill="#e8edff" font-size="28" font-family="Arial, sans-serif">Semi-structured Data Example</text>
  <rect x="24" y="70" width="592" height="290" rx="10" fill="#181e30" stroke="#4f5f8a"/>
  <rect x="44" y="92" width="552" height="246" rx="8" fill="#11182a"/>
  <g font-family="Courier New, monospace" font-size="17">
    <text x="58" y="126" fill="#9fd2ff">{</text>
    <text x="84" y="126" fill="#98ffa8">"sensor_id"</text><text x="220" y="126" fill="#d6e4ff">: "MELT-21",</text>
    <text x="84" y="156" fill="#98ffa8">"timestamp"</text><text x="220" y="156" fill="#d6e4ff">: "2026-03-03T10:15:00Z",</text>
    <text x="84" y="186" fill="#98ffa8">"laser_power_w"</text><text x="220" y="186" fill="#d6e4ff">: 245,</text>
