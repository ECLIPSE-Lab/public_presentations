<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0b1320"/>
  <text x="24" y="42" fill="#d8e6ff" font-size="28" font-family="Arial, sans-serif">Time Series Example</text>
  <rect x="24" y="70" width="592" height="290" rx="10" fill="#111d30" stroke="#3a5a8a"/>

  <!-- Plot Axes -->
  <line x1="80" y1="280" x2="560" y2="280" stroke="#d8e6ff" stroke-width="2"/>
  <line x1="80" y1="100" x2="80" y2="280" stroke="#d8e6ff" stroke-width="2"/>
  
  <text x="320" y="320" fill="#9dc3ff" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Time (t)</text>
  <text x="60" y="190" fill="#9dc3ff" font-size="16" font-family="Arial, sans-serif" text-anchor="middle" transform="rotate(-90, 60, 190)">Signal (y)</text>

  <!-- Plot Line -->
  <path d="M 100 240 L 160 180 L 220 200 L 280 130 L 340 160 L 400 110 L 460 210 L 520 150" fill="none" stroke="#5da0d6" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Points -->
  <g fill="#f1c40f">
    <circle cx="100" cy="240" r="4"/>
    <circle cx="160" cy="180" r="4"/>
    <circle cx="220" cy="200" r="4"/>
    <circle cx="280" cy="130" r="4"/>
    <circle cx="340" cy="160" r="4"/>
    <circle cx="400" cy="110" r="4"/>
    <circle cx="460" cy="210" r="4"/>
    <circle cx="520" cy="150" r="4"/>
  </g>

  <!-- Labels -->
  <g fill="#8ca9d3" font-size="14" font-family="Courier New, monospace" text-anchor="middle">
    <text x="100" y="300">t=1</text>
    <text x="160" y="300">t=2</text>
    <text x="220" y="300">t=3</text>
    <text x="280" y="300">t=4</text>
    <text x="340" y="300">t=5</text>
    <text x="400" y="300">t=6</text>
    <text x="460" y="300">t=7</text>
    <text x="520" y="300">t=8</text>
  </g>

  <text x="320" y="340" fill="#d8e6ff" font-size="16" font-family="Arial, sans-serif" text-anchor="middle">Continuous sequence recorded sequentially over time</text>
</svg>
