<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0b1320"/>
  <text x="24" y="42" fill="#d8e6ff" font-size="28" font-family="Arial, sans-serif">Binary Data Example</text>
  <rect x="24" y="70" width="592" height="290" rx="10" fill="#111d30" stroke="#3a5a8a"/>

  <g font-family="Arial, sans-serif" text-anchor="middle">
     <!-- Fail Box -->
    <rect x="120" y="120" width="160" height="120" rx="12" fill="#3d2122" stroke="#e74c3c" stroke-width="3"/>
    <path d="M 180 160 L 220 200 M 220 160 L 180 200" stroke="#e74c3c" stroke-width="8" stroke-linecap="round"/>
    
     <!-- Pass Box -->
    <rect x="360" y="120" width="160" height="120" rx="12" fill="#203a29" stroke="#2ecc71" stroke-width="3"/>
    <path d="M 410 180 L 430 200 L 470 150" stroke="#2ecc71" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="200" y="275" fill="#e74c3c" font-size="24" font-weight="bold">Fail</text>
    <text x="440" y="275" fill="#2ecc71" font-size="24" font-weight="bold">Pass</text>

    <text x="200" y="305" fill="#8ca9d3" font-size="16" font-family="Courier New, monospace">Value: 0</text>
    <text x="440" y="305" fill="#8ca9d3" font-size="16" font-family="Courier New, monospace">Value: 1</text>
    
    <text x="320" y="340" fill="#9dc3ff" font-size="16">Only two possible states (mutually exclusive)</text>
  </g>
</svg>
