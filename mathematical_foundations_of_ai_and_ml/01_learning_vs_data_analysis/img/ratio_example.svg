<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0b1320"/>
  <text x="24" y="42" fill="#d8e6ff" font-size="28" font-family="Arial, sans-serif">Ratio Data Example</text>
  <rect x="24" y="70" width="592" height="290" rx="10" fill="#111d30" stroke="#3a5a8a"/>

  <!-- Backgrounds -->
  <g fill="#1d2f4a" stroke="#3a5a8a" stroke-width="2">
    <rect x="60" y="110" width="140" height="120" rx="8" />
    <rect x="250" y="110" width="140" height="120" rx="8" />
    <rect x="440" y="110" width="140" height="120" rx="8" />
  </g>

  <!-- Weights (Ratio) -->
  <!-- 1kg Weight -->
  <g fill="#5da0d6" transform="translate(130, 185)">
    <path d="M-15,0 L15,0 L20,15 L-20,15 Z" />
    <rect x="-20" y="15" width="40" height="20" />
    <circle cx="0" cy="-5" r="5" fill="none" stroke="#5da0d6" stroke-width="3" />
  </g>

  <!-- 2kg Weight (Bigger) -->
  <g fill="#f8d36f" transform="translate(320, 180)">
    <path d="M-20,0 L20,0 L30,20 L-30,20 Z" />
    <rect x="-30" y="20" width="60" height="30" />
    <circle cx="0" cy="-6" r="6" fill="none" stroke="#f8d36f" stroke-width="3" />
  </g>

  <!-- 4kg Weight (Biggest) -->
  <g fill="#8de2a9" transform="translate(510, 170)">
    <path d="M-30,0 L30,0 L40,30 L-40,30 Z" />
    <rect x="-40" y="30" width="80" height="40" />
    <circle cx="0" cy="-8" r="8" fill="none" stroke="#8de2a9" stroke-width="4" />
  </g>

  <g font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#d8e6ff">
    <text x="130" y="264">Small</text>
    <text x="320" y="264">Medium</text>
    <text x="510" y="264">Large</text>
  </g>

  <g font-size="15" font-family="Courier New, monospace" text-anchor="middle" fill="#8ca9d3">
    <text x="130" y="290">Mass: 1 kg</text>
    <text x="320" y="290">Mass: 2 kg</text>
    <text x="510" y="290">Mass: 4 kg</text>
  </g>

  <text x="320" y="335" font-size="16" font-family="Arial, sans-serif" fill="#9dc3ff" text-anchor="middle">
    Absolute zero exists. Meaningful ratios: 4 kg is exactly 2 × 2 kg
  </text>
</svg>
