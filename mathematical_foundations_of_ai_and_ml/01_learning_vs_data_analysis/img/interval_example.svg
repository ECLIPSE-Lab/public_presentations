<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0b1320"/>
  <text x="24" y="42" fill="#d8e6ff" font-size="28" font-family="Arial, sans-serif">Interval Data Example</text>
  <rect x="24" y="70" width="592" height="290" rx="10" fill="#111d30" stroke="#3a5a8a"/>

  <!-- Backgrounds -->
  <g fill="#1d2f4a" stroke="#3a5a8a" stroke-width="2">
    <rect x="60" y="110" width="140" height="120" rx="8" />
    <rect x="250" y="110" width="140" height="120" rx="8" />
    <rect x="440" y="110" width="140" height="120" rx="8" />
  </g>

  <!-- Ice -->
  <g fill="#5da0d6">
    <polygon points="130,130 150,150 130,170 110,150" />
    <polygon points="110,140 130,160 110,180 90,160" />
    <polygon points="150,140 170,160 150,180 130,160" />
  </g>

  <!-- Thermometer -->
  <g fill="#f8d36f">
    <rect x="315" y="140" width="10" height="40" rx="5" />
    <circle cx="320" cy="180" r="10" />
    <rect x="317" y="150" width="6" height="30" fill="#f44336" />
  </g>

  <!-- Boiling -->
  <g fill="#8de2a9">
    <path d="M495 180 Q510 180 510 160 Q510 140 525 140 Q540 140 540 160" stroke="#8de2a9" stroke-width="4" fill="none" />
    <path d="M480 170 Q495 170 495 150 Q495 130 510 130 Q525 130 525 150" stroke="#8de2a9" stroke-width="4" fill="none" />
    <path d="M510 190 Q525 190 525 170 Q525 150 540 150 Q555 150 555 170" stroke="#8de2a9" stroke-width="4" fill="none" />
  </g>

  <g font-size="20" font-family="Arial, sans-serif" text-anchor="middle" fill="#d8e6ff">
    <text x="130" y="264">Freezing</text>
    <text x="320" y="264">Room Temp</text>
    <text x="510" y="264">Boiling</text>
  </g>

  <g font-size="15" font-family="Courier New, monospace" text-anchor="middle" fill="#8ca9d3">
    <text x="130" y="290">0 ℃</text>
    <text x="320" y="290">20 ℃</text>
    <text x="510" y="290">100 ℃</text>
  </g>

  <text x="320" y="335" font-size="16" font-family="Arial, sans-serif" fill="#9dc3ff" text-anchor="middle">
    Distances are meaningful (+, -) but 0 is arbitrary (not an absolute zero)
  </text>
</svg>
