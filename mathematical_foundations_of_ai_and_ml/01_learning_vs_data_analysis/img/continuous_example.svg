<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <defs>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="#ffffff" rx="12" />
  
  <!-- Grid lines -->
  <path d="M 30 160 L 270 160 M 30 120 L 270 120 M 30 80 L 270 80 M 30 40 L 270 40" stroke="#f1f5f9" stroke-width="1.5" />
  <path d="M 30 160 L 30 40 M 90 160 L 90 40 M 150 160 L 150 40 M 210 160 L 210 40 M 270 160 L 270 40" stroke="#f1f5f9" stroke-width="1.5" />
  
  <!-- Axes -->
  <polyline points="30,40 30,160 270,160" fill="none" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Filled area under the curve -->
  <path d="M 30 160 L 30 120 C 70 20, 120 180, 170 120 C 220 60, 240 70, 270 90 L 270 160 Z" fill="url(#waveGradient)"/>
  
  <!-- The curve -->
  <path d="M 30 120 C 70 20, 120 180, 170 120 C 220 60, 240 70, 270 90" fill="none" stroke="#0ea5e9" stroke-width="3" stroke-linecap="round"/>

  <!-- Specific point to highlight continuous nature -->
  <circle cx="195" cy="90" r="4" fill="#0284c7" stroke="#fff" stroke-width="1.5"/>
  <line x1="195" y1="160" x2="195" y2="90" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="30" y1="90" x2="195" y2="90" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  
  <!-- Value Box -->
  <rect x="202" y="75" width="54" height="16" fill="#f8fafc" rx="3" stroke="#cbd5e1" stroke-width="1"/>
  <text x="229" y="86" font-family="sans-serif" font-size="9" font-weight="bold" fill="#334155" text-anchor="middle">y = 4.82...</text>
</svg>
