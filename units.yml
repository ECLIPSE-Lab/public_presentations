# Single source of truth for slide-unit metadata.
#
# Used by scripts/build_link_tables.py to:
#   - regenerate the unit tables in README.md and index.qmd
#   - generate per-deck "Continue" (prev/next) slides
#
# Edit this file, then run:
#   python3 scripts/build_link_tables.py
#
# Schema:
#   courses.<key>.title         -- human-readable course name (used as section header)
#   courses.<key>.site_path     -- top-level folder (also URL segment under pelzlab.science/public_presentations/)
#   courses.<key>.units[].num         -- zero-padded unit number, e.g. "01"
#   courses.<key>.units[].title       -- short unit title
#   courses.<key>.units[].folder      -- folder name under site_path
#   courses.<key>.units[].deck_file   -- HTML file name (rendered slides)
#   courses.<key>.units[].source_file -- primary .qmd source file
#   courses.<key>.units[].published   -- whether to include in link tables
#   courses.<key>.units[].extras      -- (optional) list of {label, file} companion HTML files
#
# Site URL prefix is hard-coded in the script:
#   https://pelzlab.science/public_presentations/

site_url: "https://pelzlab.science/public_presentations"
