<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0b1320"/>
  <text x="24" y="42" fill="#d8e6ff" font-size="28" font-family="Arial, sans-serif">Labels (Targets) Example</text>
  <rect x="24" y="70" width="592" height="290" rx="10" fill="#111d30" stroke="#3a5a8a"/>

  <!-- Left Side: Inputs X -->
  <rect x="60" y="100" width="200" height="150" rx="6" fill="#1d2f4a" stroke="#5da0d6" stroke-width="2"/>
  <text x="160" y="130" fill="#5da0d6" font-size="20" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle">Inputs (X)</text>
  <g fill="#e7eef9" font-size="14" font-family="Courier New, monospace" text-anchor="start">
    <text x="80" y="160">[1.2, 0.4, 55.1]</text>
    <text x="80" y="190">[0.9, 0.5, 42.0]</text>
    <text x="80" y="220">[1.5, 0.3, 61.2]</text>
  </g>

  <!-- Arrow mapping X to Y -->
  <path d="M 280 175 L 360 175" stroke="#f1c40f" stroke-width="4" fill="none"/>
  <polygon points="360,165 375,175 360,185" fill="#f1c40f"/>
  <text x="325" y="165" fill="#f1c40f" font-size="18" font-family="Courier New, monospace" text-anchor="middle">f(x)</text>

  <!-- Right Side: Labels Y -->
  <rect x="390" y="100" width="160" height="150" rx="6" fill="#3d2122" stroke="#e74c3c" stroke-width="2"/>
  <text x="470" y="130" fill="#e74c3c" font-size="20" font-weight="bold" font-family="Arial, sans-serif" text-anchor="middle">Labels (Y)</text>
  <g fill="#e7eef9" font-size="14" font-family="Courier New, monospace" text-anchor="middle">
    <text x="470" y="160">Class A</text>
    <text x="470" y="190">Class B</text>
    <text x="470" y="220">Class A</text>
  </g>

  <!-- Concept -->
  <g font-family="Arial, sans-serif" fill="#9dc3ff" text-anchor="middle" font-size="16">
    <text x="320" y="290">Supervised learning connects features to a known target.</text>
    <text x="320" y="330">Label <tspan fill="#e74c3c">y</tspan> represents the "ground truth" to predict.</text>
  </g>
</svg>
