<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0b1320"/>
  <text x="24" y="42" fill="#d8e6ff" font-size="28" font-family="Arial, sans-serif">Cardinal Data Example</text>
  <rect x="24" y="70" width="592" height="290" rx="10" fill="#111d30" stroke="#3a5a8a"/>
  
  <g font-family="Arial, sans-serif" fill="#d8e6ff">
    <!-- Number line -->
    <line x1="80" y1="180" x2="560" y2="180" stroke="#3a5a8a" stroke-width="4"/>
    <!-- Ticks -->
    <line x1="120" y1="170" x2="120" y2="190" stroke="#d8e6ff" stroke-width="3"/>
    <line x1="320" y1="170" x2="320" y2="190" stroke="#d8e6ff" stroke-width="3"/>
    <line x1="520" y1="170" x2="520" y2="190" stroke="#d8e6ff" stroke-width="3"/>

    <text x="120" y="220" font-size="20" text-anchor="middle">10 kg</text>
    <text x="320" y="220" font-size="20" text-anchor="middle">20 kg</text>
    <text x="520" y="220" font-size="20" text-anchor="middle">30 kg</text>

    <!-- Distance arcs -->
    <!-- Arc from 10 to 20 -->
    <path d="M 120 160 Q 220 100 320 160" fill="none" stroke="#2ecc71" stroke-width="3" stroke-dasharray="8,4"/>
    <path d="M 310 155 L 320 160 L 315 150" fill="none" stroke="#2ecc71" stroke-width="3"/>
    <text x="220" y="115" fill="#2ecc71" font-size="16" text-anchor="middle">+ 10 kg</text>

    <!-- Arc from 20 to 30 -->
    <path d="M 320 160 Q 420 100 520 160" fill="none" stroke="#2ecc71" stroke-width="3" stroke-dasharray="8,4"/>
    <path d="M 510 155 L 520 160 L 515 150" fill="none" stroke="#2ecc71" stroke-width="3"/>
    <text x="420" y="115" fill="#2ecc71" font-size="16" text-anchor="middle">+ 10 kg</text>

    <!-- Meaning -->
    <text x="320" y="290" fill="#8ca9d3" font-size="20" text-anchor="middle" font-family="Courier New, monospace">30 kg - 20 kg  ==  20 kg - 10 kg</text>
    <text x="320" y="335" fill="#9dc3ff" font-size="16" text-anchor="middle">Differences and arithmetic operations have precise meaning</text>
  </g>
</svg>
