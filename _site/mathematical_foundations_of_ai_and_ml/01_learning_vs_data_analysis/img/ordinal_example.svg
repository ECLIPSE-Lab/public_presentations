<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400">
  <rect width="640" height="400" fill="#0b1320"/>
  <text x="24" y="42" fill="#d8e6ff" font-size="28" font-family="Arial, sans-serif">Ordinal Data Example</text>
  <rect x="24" y="70" width="592" height="290" rx="10" fill="#111d30" stroke="#3a5a8a"/>

  <g font-family="Arial, sans-serif" text-anchor="middle">
    <!-- Star ratings -->
    <text x="130" y="140" fill="#f1c40f" font-size="32">★☆☆</text>
    <text x="320" y="140" fill="#f1c40f" font-size="32">★★☆</text>
    <text x="510" y="140" fill="#f1c40f" font-size="32">★★★</text>

     <!-- Bars -->
    <rect x="90" y="180" width="80" height="60" rx="4" fill="#a7c0cd"/>
    <rect x="280" y="160" width="80" height="80" rx="4" fill="#5c8aae"/>
    <rect x="470" y="120" width="80" height="120" rx="4" fill="#1a4d7a"/>

    <text x="130" y="270" fill="#d8e6ff" font-size="20">Poor</text>
    <text x="320" y="270" fill="#d8e6ff" font-size="20">Fair</text>
    <text x="510" y="270" fill="#d8e6ff" font-size="20">Good</text>

    <!-- Encoding -->
    <text x="130" y="300" fill="#8ca9d3" font-size="16" font-family="Courier New, monospace">Value = 1</text>
    <text x="320" y="300" fill="#8ca9d3" font-size="16" font-family="Courier New, monospace">Value = 2</text>
    <text x="510" y="300" fill="#8ca9d3" font-size="16" font-family="Courier New, monospace">Value = 3</text>
    
    <text x="320" y="335" fill="#9dc3ff" font-size="16">1 &lt; 2 &lt; 3 (Ranked order, but spacing isn't uniform)</text>
  </g>
</svg>
