<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gradient Descent Intuition</title>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: transparent; color: #cbd5e1; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
    #controls { background: rgba(30, 41, 59, 0.7); border: 1px solid #475569; padding: 15px 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.5); margin-bottom: 10px; width: 100%; max-width: 900px; display: flex; justify-content: space-around; align-items: center; }
    .control-group { display: flex; flex-direction: column; align-items: center; }
    label { font-weight: 600; margin-bottom: 5px; font-size: 16px; }
    input[type=range] { width: 250px; }
    output { font-family: monospace; background: #0f172a; padding: 2px 8px; border-radius: 4px; margin-left: 10px; }
    #plot-container { background: transparent; width: 100%; max-width: 1000px; }
    .instructions { font-size: 15px; color: #94a3b8; margin-top: 5px; max-width: 900px; text-align: center; }
  </style>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>

  <div id="controls">
    <div class="control-group">
      <label for="lr">Learning Rate (&eta;): <output id="lr-val">0.10</output></label>
      <input type="range" id="lr" min="0.01" max="0.30" step="0.01" value="0.10">
    </div>
    <div class="control-group">
      <label for="steps">Max Steps: <output id="steps-val">20</output></label>
      <input type="range" id="steps" min="1" max="100" step="1" value="20">
    </div>
  </div>

  <div id="plot-container">
    <div id="plot" style="width: 100%; height: 700px;"></div>
  </div>
  
  <p class="instructions">
    <strong>Click anywhere on the contour plot to set the starting point.</strong><br>
    Observe how a large learning rate causes oscillations (especially in the steeper Y-axis), while a small one fails to converge.
  </p>

  <script>
    const f = (x, y) => Math.pow(x, 2) + 4 * Math.pow(y, 2);
    const grad = (x, y) => [2 * x, 8 * y];

    function np_linspace(start, end, num) {
      const arr = [];
      const step = (end - start) / (num - 1);
      for(let i=0; i<num; i++) arr.push(start + step * i);
      return arr;
    }

    const xRange = np_linspace(-5, 5, 100);
    const yRange = np_linspace(-5, 5, 100);
    const zData = [];
    for (let y of yRange) {
      let row = [];
      for (let x of xRange) row.push(f(x, y));
      zData.push(row);
    }

    let startX = -4.0;
    let startY = 3.0;

    const contourTrace = {
      z: zData,
      x: xRange,
      y: yRange,
      type: 'contour',
      colorscale: 'YlGnBu',
      reversescale: true,
      contours: { coloring: 'lines' },
      line: { width: 1.5, smoothing: 1.3 },
      showscale: false,
      hoverinfo: 'none'
    };

    const layout = {
      title: { text: 'Cost Landscape: J(x,y) = x² + 4y²', font: { color: '#cbd5e1', size: 24 } },
      xaxis: { title: 'Parameter x', range: [-5, 5], fixedrange: true, color: '#94a3b8', gridcolor: '#334155' },
      yaxis: { title: 'Parameter y', range: [-5, 5], fixedrange: true, color: '#94a3b8', gridcolor: '#334155' },
      margin: { l: 60, r: 60, b: 60, t: 80 },
      hovermode: 'closest',
      plot_bgcolor: "rgba(0,0,0,0)",
      paper_bgcolor: "rgba(0,0,0,0)"
    };

    Plotly.newPlot('plot', [contourTrace], layout, {responsive: true, displayModeBar: false});

    function runGradientDescent() {
      const lr = parseFloat(document.getElementById('lr').value);
      const maxSteps = parseInt(document.getElementById('steps').value);
      
      let xs = [startX];
      let ys = [startY];
      let currentX = startX;
      let currentY = startY;

      for (let i = 0; i < maxSteps; i++) {
        let [gX, gY] = grad(currentX, currentY);
        currentX -= lr * gX;
        currentY -= lr * gY;
        xs.push(currentX);
        ys.push(currentY);
        if (Math.abs(currentX) > 20 || Math.abs(currentY) > 20) break;
      }

      const pathTrace = {
        x: xs,
        y: ys,
        mode: 'lines+markers',
        type: 'scatter',
        marker: { color: '#ef4444', size: 8, symbol: 'circle' },
        line: { color: '#ef4444', width: 3 },
        name: 'GD Path',
        hoverinfo: 'x+y'
      };
      
      const startMarker = {
        x: [startX],
        y: [startY],
        mode: 'markers',
        type: 'scatter',
        marker: { color: '#38bdf8', size: 14, symbol: 'star' },
        name: 'Start',
        hoverinfo: 'none'
      };

      Plotly.react('plot', [contourTrace, pathTrace, startMarker], layout);
    }

    document.getElementById('plot').on('plotly_click', function(data){
      startX = data.points[0].x;
      startY = data.points[0].y;
      runGradientDescent();
    });

    document.getElementById('lr').addEventListener('input', function() {
      document.getElementById('lr-val').innerText = parseFloat(this.value).toFixed(2);
      runGradientDescent();
    });

    document.getElementById('steps').addEventListener('input', function() {
      document.getElementById('steps-val').innerText = this.value;
      runGradientDescent();
    });

    runGradientDescent();
  </script>
</body>
</html>
