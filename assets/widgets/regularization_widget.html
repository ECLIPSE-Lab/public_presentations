<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Regularization Widget</title>
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #334155; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    #controls { background: white; padding: 15px 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; width: 100%; max-width: 800px; display: flex; justify-content: space-around; align-items: center; }
    .control-group { display: flex; flex-direction: column; align-items: center; }
    label { font-weight: 600; margin-bottom: 5px; font-size: 14px; }
    input[type=range] { width: 200px; }
    .value-display { font-family: monospace; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; margin-top: 5px; }
    #canvas-container { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; display: flex; justify-content: center; width: 100%; max-width: 800px; }
    canvas { border: 1px solid #cbd5e1; border-radius: 4px; cursor: crosshair; }
    .btn { background: #38bdf8; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: background 0.2s; }
    .btn:hover { background: #0284c7; }
    .instructions { font-size: 13px; color: #64748b; margin-top: 10px; max-width: 800px; text-align: center; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
</head>
<body>

  <div id="controls">
    <div class="control-group">
      <label for="degree">Polynomial Degree: <output id="degree-val">10</output></label>
      <input type="range" id="degree" min="1" max="15" value="10">
    </div>
    
    <div class="control-group">
      <label for="lambda">Regularization Strength (&lambda;):</label>
      <input type="range" id="lambda" min="-6" max="2" step="0.1" value="-6">
      <div class="value-display" id="lambda-val">1e-6</div>
    </div>

    <button class="btn" id="clear-btn">Clear Points</button>
  </div>

  <div id="canvas-container">
    <canvas id="plot" width="700" height="400"></canvas>
  </div>
  
  <p class="instructions">
    <strong>Click to add points.</strong> Observe how a high-degree polynomial overfits the data when &lambda; is small. 
    Increase &lambda; to penalize complexity (Ridge Regression) and enforce a smoother fit.
  </p>

  <script>
    const canvas = document.getElementById('plot');
    const ctx = canvas.getContext('2d');
    const degreeSlider = document.getElementById('degree');
    const degreeVal = document.getElementById('degree-val');
    const lambdaSlider = document.getElementById('lambda');
    const lambdaVal = document.getElementById('lambda-val');
    const clearBtn = document.getElementById('clear-btn');

    let points = [];
    const width = canvas.width;
    const height = canvas.height;
    
    // Add some initial noisy points based on a sine wave
    for(let i=0; i<15; i++) {
        let x = 50 + i * (600 / 14);
        let normalizedX = (x / width) * Math.PI * 2;
        let y = height/2 - Math.sin(normalizedX) * 100 + (Math.random() - 0.5) * 60;
        points.push({x, y});
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);
      
      // Draw grid
      ctx.strokeStyle = '#f1f5f9';
      ctx.lineWidth = 1;
      for(let i=0; i<width; i+=50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke(); }
      for(let i=0; i<height; i+=50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke(); }

      // Draw points
      ctx.fillStyle = '#0f172a';
      for (let p of points) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      if (points.length < 2) return;

      const degree = parseInt(degreeSlider.value);
      const lambda = Math.pow(10, parseFloat(lambdaSlider.value));

      // Fit polynomial with L2 Regularization (Ridge)
      // We normalize X to avoid numerical instability with high degrees
      let nx = points.map(p => (p.x - width/2) / (width/2)); 
      let ny = points.map(p => p.y);
      
      // Construct Vandermonde matrix
      let X = [];
      for (let i = 0; i < nx.length; i++) {
        let row = [];
        for (let j = 0; j <= degree; j++) row.push(Math.pow(nx[i], j));
        X.push(row);
      }
      
      // X transpose
      let XT = numeric.transpose(X);
      
      // XT * X
      let XTX = numeric.dot(XT, X);
      
      // Add Lambda to diagonal (not regularizing bias term ideally, but keeping it simple)
      for (let i = 0; i <= degree; i++) {
          if (i > 0) XTX[i][i] += lambda * points.length; // Scale lambda by N arbitrarily for feel
      }
      
      // XT * y
      let XTy = numeric.dot(XT, ny);
      
      // Solve weights
      let w = [];
      try {
        let invXTX = numeric.inv(XTX);
        w = numeric.dot(invXTX, XTy);
      } catch(e) {
        console.error("Matrix inversion failed", e);
        return; // singular
      }

      // Draw fitted curve
      ctx.beginPath();
      ctx.strokeStyle = '#e74c3c';
      if (lambda > 0.1) ctx.strokeStyle = '#f59e0b';
      if (lambda > 10) ctx.strokeStyle = '#2ecc71';
      ctx.lineWidth = 4;

      for (let px = 0; px <= width; px += 2) {
        let n_px = (px - width/2) / (width/2);
        let py = 0;
        for (let j = 0; j <= degree; j++) {
            py += w[j] * Math.pow(n_px, j);
        }
        if (px === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.stroke();
    }

    // Interactions
    canvas.addEventListener('mousedown', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      points.push({x, y});
      draw();
    });

    clearBtn.addEventListener('click', () => { points = []; draw(); });

    degreeSlider.addEventListener('input', () => {
      degreeVal.innerText = degreeSlider.value;
      draw();
    });

    lambdaSlider.addEventListener('input', () => {
      let val = parseFloat(lambdaSlider.value);
      lambdaVal.innerText = val === -6 ? "0 (Unregularized)" : "1e" + val.toFixed(1);
      draw();
    });

    // Initialize
    draw();
  </script>
</body>
</html>
